    <script>
        debugger
    let r = true

        let y;
        let task = prompt('Номер задания?')
        if (task == 1)

            while (q == true)

                function checkElem (num) {
                if (num % 2 === 0) {

                    q = false;

            }

        else if (task == 2)

                function changeElem(arr, num) {
                    for (let i = 0; i < arr.length; i++) {
                        arr[i] = Number(arr[i]*= num)
                    }
                    return arr;
                }
                
                let arr = [];

                function sumElem(array) {
                    let sum = 0;

                        let numbarr = Number(array[i])
                        if (!Number.isNaN(numbarr)) {
                            sum+= numbarr
                        }
                    }
                    return sum;
                }
                
                let array = [];

        else if (task == 4)
        {
            while (q == true)
            {                
                    function reverseIndex(array4) {
                        let arrrev = []
                        for (let i = n4-1; i >= 0; i--){
                            arrrev.push(array4[i])
                        }
                    return arrrev;
                }
                
                let array4 = [];

                function checkElem5(array5, callback) {
                    for (let i = 0; i < array5.length; i++) {
                        if (callback(array5[i])) { 
                            return true;
                        }
                    }
                    return false;
                }
                
                let array5 = [];
