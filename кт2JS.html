    <script>
    let r = true

        let task = prompt('Номер задания?')

        {
            while (q == true)

                let word = prompt("Enter a word:");

                let res = ''

                    res += word[i]
                }
                console.log(res)

                {
                    r = false;
                }
                contin = prompt('Еще раз? любой символ/n')
                if (contin == 'n')
                {
                    q = false;
                }
            }
        }

                    }
